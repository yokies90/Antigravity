<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg: #F3F4F6;
      --surface: #FFFFFF;
      --text: #111827;
      --border: #D1D5DB;
      --success: #059669;
      --error: #DC2626;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
    }

    .container {
      background-color: var(--surface);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      width: 100%;
      max-width: 420px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 14px;
      color: #374151;
    }

    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      background-color: #F9FAFB;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background-color: var(--surface);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      width: 100%;
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #msg {
      margin-top: 24px;
      text-align: center;
      font-weight: 500;
      color: var(--success);
      min-height: 24px;
      margin-bottom: 0;
      font-size: 15px;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Contact us</h1>
    <form id="contactForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your Name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="How can we help you?"></textarea>
      </div>
      <button type="submit" id="submitBtn">Send</button>
    </form>
    <p id="msg"></p>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const msg = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');
    
    const URL = "https://script.google.com/macros/s/AKfycbyFj6ahiDwekuxyNSjQi6tMlnVqb_XQrnl1-p4Mcu_6pIq5riSWQCOu-j2A61qCWfcQ7w/exec";

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      
      submitBtn.textContent = 'Sending...';
      submitBtn.disabled = true;
      msg.textContent = '';
      msg.style.color = 'var(--success)';

      try {
        await fetch(URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });
        
        msg.textContent = "Thanks! We'll get back to you.";
        form.reset();
      } catch (error) {
        msg.textContent = "An error occurred. Please try again.";
        msg.style.color = 'var(--error)';
      } finally {
        submitBtn.textContent = 'Send';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
